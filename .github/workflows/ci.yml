name: Basic CI Pipeline

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  basic-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Verify repository structure
      run: |
        echo "Verifying repository structure..."
        ls -la
        echo "CI check completed successfully"